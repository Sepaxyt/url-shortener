<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        let path = window.location.pathname.substring(1);
        
        if(path && path !== 'index.html' && path !== '') {
            let links = JSON.parse(localStorage.getItem('shortLinks')) || {};
            if(links[path]) {
                window.location.href = links[path];
            } else {
                window.location.href = '/url-shortener/';
            }
        } else {
            window.location.href = '/url-shortener/';
        }
    </script>
</head>
<body>
    <h2>Redirecting...</h2>
    <p>Please wait...</p>
</body>
</html>
