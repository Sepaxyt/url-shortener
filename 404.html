<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: white;
        }
    </style>
    <script>
        let path = window.location.pathname.substring(1);
        
        if(path && path !== 'index.html' && path !== '') {
            try {
                let links = JSON.parse(localStorage.getItem('shortLinks_backup') || '{}');
                if(links[path]) {
                    window.location.href = links[path].url;
                }
            } catch(e) {
                console.log('Redirect error:', e);
            }
        }
        
        // Fallback - redirect to home after 3 seconds
        setTimeout(() => {
            window.location.href = '/url-shortener/';
        }, 3000);
    </script>
</head>
<body>
    <h2>🔄 Redirecting...</h2>
    <div class="loader"></div>
    <p>Please wait, redirecting to your destination...</p>
    <p><a href="/url-shortener/">Click here</a> if not redirected.</p>
</body>
</html>
