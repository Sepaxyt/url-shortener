<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener - 5 Digit Short Links</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        input, button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 16px;
            border-radius: 10px;
            border: 2px solid #ddd;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #5a67d8;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 10px;
            display: none;
            word-break: break-all;
        }
        .result.show {
            display: block;
        }
        .copy-btn {
            background: #28a745;
            margin-top: 10px;
        }
        .links-list {
            margin-top: 30px;
            max-height: 300px;
            overflow-y: auto;
        }
        .link-item {
            background: #f5f5f5;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-btn {
            background: #dc3545;
            padding: 5px 10px;
            width: auto;
            margin: 0;
        }
        .error {
            background: #ffebee;
            color: #c62828;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔗 5-6 Digit URL Shortener</h1>
    <div class="subtitle">Free | Permanent | No Ads</div>
    
    <input type="url" id="longUrl" placeholder="Enter your long URL" value="https://viral09.netlify.app">
    <input type="text" id="customCode" placeholder="Custom short code (optional) - 5-6 letters/numbers">
    <button onclick="createShortLink()">✨ Create Short Link</button>
    
    <div id="result" class="result"></div>
    
    <div class="links-list">
        <h3>📊 Your Short Links</h3>
        <div id="linkList"></div>
    </div>
</div>

<script>
    // Simple storage - No GitHub token needed!
    let shortLinks = JSON.parse(localStorage.getItem('shortLinks')) || {};
    
    function displayLinks() {
        let linkListDiv = document.getElementById('linkList');
        let links = Object.entries(shortLinks).reverse();
        
        if(links.length === 0) {
            linkListDiv.innerHTML = '<p style="color:#999; text-align:center;">No short links yet. Create your first one!</p>';
            return;
        }
        
        let currentUrl = window.location.href.split('?')[0];
        linkListDiv.innerHTML = links.map(([code, url]) => `
            <div class="link-item">
                <div>
                    <strong>/${code}</strong><br>
                    <small>${url.substring(0, 40)}${url.length > 40 ? '...' : ''}</small>
                </div>
                <div>
                    <button onclick="copyToClipboard('${currentUrl}${code}')" style="background:#007bff; padding:5px 10px; width:auto; margin-right:5px;">Copy</button>
                    <button class="delete-btn" onclick="deleteLink('${code}')">Del</button>
                </div>
            </div>
        `).join('');
    }
    
    function createShortLink() {
        let longUrl = document.getElementById('longUrl').value.trim();
        let customCode = document.getElementById('customCode').value.trim();
        
        if(!longUrl) {
            showMessage('Please enter a URL!', 'error');
            return;
        }
        
        if(!longUrl.startsWith('http')) {
            longUrl = 'https://' + longUrl;
        }
        
        let shortCode = customCode;
        if(!shortCode) {
            shortCode = generateRandomCode();
        }
        
        shortCode = shortCode.toLowerCase();
        
        if(shortCode.length < 4 || shortCode.length > 8) {
            showMessage('Short code must be 4-8 characters!', 'error');
            return;
        }
        
        if(!/^[a-z0-9]+$/.test(shortCode)) {
            showMessage('Use only letters (a-z) and numbers (0-9)!', 'error');
            return;
        }
        
        if(shortLinks[shortCode]) {
            showMessage('This code already exists! Try another.', 'error');
            return;
        }
        
        shortLinks[shortCode] = longUrl;
        localStorage.setItem('shortLinks', JSON.stringify(shortLinks));
        
        displayLinks();
        
        let currentUrl = window.location.href.split('?')[0];
        let shortUrl = currentUrl + shortCode;
        
        document.getElementById('result').innerHTML = `
            <strong>✅ Success!</strong><br>
            Your short link: <a href="${shortUrl}" target="_blank">${shortUrl}</a><br><br>
            <button class="copy-btn" onclick="copyToClipboard('${shortUrl}')">📋 Copy Link</button>
        `;
        document.getElementById('result').classList.add('show');
        
        document.getElementById('customCode').value = '';
        
        setTimeout(() => {
            document.getElementById('result').classList.remove('show');
        }, 5000);
    }
    
    function generateRandomCode() {
        let length = Math.random() < 0.5 ? 5 : 6;
        let chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
        let code = '';
        for(let i = 0; i < length; i++) {
            code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return code;
    }
    
    function deleteLink(code) {
        if(confirm('Delete this short link?')) {
            delete shortLinks[code];
            localStorage.setItem('shortLinks', JSON.stringify(shortLinks));
            displayLinks();
            showMessage('Link deleted!', 'success');
        }
    }
    
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        showMessage('Copied to clipboard!', 'success');
    }
    
    function showMessage(msg, type) {
        let resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `<div class="${type === 'error' ? 'error' : ''}" style="padding:12px; border-radius:8px;">${msg}</div>`;
        resultDiv.classList.add('show');
        setTimeout(() => resultDiv.classList.remove('show'), 2000);
    }
    
    // Handle redirect
    function handleRedirect() {
        let path = window.location.pathname.substring(1);
        
        if(path && path !== 'index.html' && path !== '') {
            let links = JSON.parse(localStorage.getItem('shortLinks')) || {};
            if(links[path]) {
                window.location.href = links[path];
            } else {
                document.body.innerHTML = `
                    <div style="text-align:center; margin-top:100px; font-family:Arial;">
                        <h1>❌ Invalid Short Link</h1>
                        <p>Link "${path}" does not exist.</p>
                        <a href="/url-shortener/">← Go Home</a>
                    </div>
                `;
            }
        }
    }
    
    displayLinks();
    handleRedirect();
</script>
</body>
</html>
