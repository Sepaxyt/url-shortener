<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5-6 Digit URL Shortener</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: 40px auto;
            background: white;
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #1e1e2f;
            font-size: 1.9rem;
            margin-bottom: 8px;
        }
        .sub {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        input, button {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            font-size: 16px;
            border-radius: 12px;
            border: 1.5px solid #e2e8f0;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
        }
        button:active {
            transform: scale(0.98);
        }
        .result-card {
            margin-top: 25px;
            padding: 18px;
            background: #eef2ff;
            border-radius: 16px;
            display: none;
            word-break: break-all;
            text-align: center;
        }
        .result-card.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .short-link {
            background: white;
            padding: 12px;
            border-radius: 12px;
            margin: 12px 0;
            font-size: 1.1rem;
            font-weight: 500;
        }
        .short-link a {
            color: #4f46e5;
            text-decoration: none;
        }
        .copy-btn {
            background: #10b981;
            margin-top: 5px;
            padding: 10px;
            font-size: 0.9rem;
        }
        .link-list {
            margin-top: 35px;
            max-height: 320px;
            overflow-y: auto;
        }
        .link-item {
            background: #f8fafc;
            padding: 12px;
            margin: 10px 0;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            border: 1px solid #e2e8f0;
        }
        .link-code {
            font-weight: 700;
            color: #4f46e5;
            font-family: monospace;
            font-size: 1rem;
        }
        .delete-btn {
            background: #ef4444;
            padding: 5px 12px;
            width: auto;
            margin: 0;
            font-size: 0.75rem;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 999;
        }
        .error-msg {
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 12px;
            margin-top: 15px;
        }
        hr {
            margin: 20px 0;
            border-color: #e2e8f0;
        }
        .badge {
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-left: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ 5-6 Digit Shortener</h1>
    <div class="sub">Apna short link banayein | Free | Permanent</div>

    <input type="url" id="longUrl" placeholder="Long URL: https://viral09.netlify.app" value="https://viral09.netlify.app">
    <input type="text" id="customCode" placeholder="Custom code (4-8 chars) - jaise: viral99">
    <button id="createBtn">🚀 Generate Short Link</button>

    <div id="resultArea" class="result-card"></div>

    <div class="link-list">
        <h3>📂 Aapke short links <span id="countBadge" class="badge">0</span></h3>
        <div id="linksContainer">✨ Koi link nahi, upar wala form bhariye...</div>
    </div>
</div>

<div id="toastMsg" class="toast">✅ Copied!</div>

<script>
    // ---------- STORAGE ----------
    let shortLinks = JSON.parse(localStorage.getItem('my_short_links')) || {};

    // ---------- DOM elements ----------
    const longUrlInput = document.getElementById('longUrl');
    const customCodeInput = document.getElementById('customCode');
    const createBtn = document.getElementById('createBtn');
    const resultDiv = document.getElementById('resultArea');
    const linksContainer = document.getElementById('linksContainer');
    const countBadge = document.getElementById('countBadge');

    // ---------- Helper: Toast message ----------
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = isError ? `⚠️ ${msg}` : `✅ ${msg}`;
        toast.style.backgroundColor = isError ? '#b91c1c' : '#10b981';
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
        }, 2000);
    }

    // ---------- Random 5-6 digit code ----------
    function generateRandomCode() {
        let len = Math.random() < 0.6 ? 5 : 6;  // mostly 5, sometimes 6
        const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
        let code = '';
        for (let i = 0; i < len; i++) {
            code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return code;
    }

    // ---------- Show created link result ----------
    function showSuccess(shortUrl, originalUrl, code) {
        resultDiv.innerHTML = `
            <div style="font-weight:bold; margin-bottom:8px;">✅ Short link ready!</div>
            <div class="short-link">
                🔗 <a href="${shortUrl}" target="_blank">${shortUrl}</a>
            </div>
            <button class="copy-btn" onclick="copyToClipboardManual('${shortUrl}')">📋 Copy link</button>
            <div style="font-size:12px; color:#475569; margin-top:10px;">
                ↪️ Redirects to: ${originalUrl.length > 55 ? originalUrl.substring(0, 55) + '…' : originalUrl}<br>
                🏷️ Code: <strong>${code}</strong> | 🔁 Permanent
            </div>
        `;
        resultDiv.classList.add('show');
        
        // Auto hide after 9 seconds
        setTimeout(() => {
            resultDiv.classList.remove('show');
        }, 9000);
    }

    // ---------- Render saved links list ----------
    function renderLinksList() {
        const entries = Object.entries(shortLinks).reverse();
        const count = entries.length;
        countBadge.innerText = count;

        if (count === 0) {
            linksContainer.innerHTML = '✨ Koi short link nahi, upar wala form bhariye...';
            return;
        }

        const baseUrl = window.location.origin + window.location.pathname.replace(/\/$/, '') + '/';
        
        linksContainer.innerHTML = entries.map(([code, fullUrl]) => `
            <div class="link-item">
                <div>
                    <div class="link-code">🔗 /${code}</div>
                    <div style="font-size:12px; color:#475569;">${fullUrl.length > 45 ? fullUrl.substring(0, 45) + '…' : fullUrl}</div>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="copy-btn" style="background:#3b82f6; padding:5px 12px; width:auto;" onclick="copyToClipboardManual('${baseUrl}${code}')">Copy</button>
                    <button class="delete-btn" onclick="deleteShortLink('${code}')">Delete</button>
                </div>
            </div>
        `).join('');
    }

    // ---------- Delete link ----------
    window.deleteShortLink = function(code) {
        if (confirm(`"${code}" ko delete karna?`)) {
            delete shortLinks[code];
            localStorage.setItem('my_short_links', JSON.stringify(shortLinks));
            renderLinksList();
            showToast('Link delete ho gaya', false);
            // agar result area me same code dikh raha ho to clear
            resultDiv.classList.remove('show');
        }
    };

    // ---------- Copy to clipboard (global function) ----------
    window.copyToClipboardManual = function(text) {
        navigator.clipboard.writeText(text).then(() => {
            showToast('Link copy ho gaya!');
        }).catch(() => {
            showToast('Copy failed, manually copy karo', true);
        });
    };

    // ---------- Create new short link ----------
    function createNewShortLink() {
        let longUrl = longUrlInput.value.trim();
        let customCode = customCodeInput.value.trim();

        if (!longUrl) {
            showToast('URL daalo bhai!', true);
            return;
        }

        if (!longUrl.startsWith('http://') && !longUrl.startsWith('https://')) {
            longUrl = 'https://' + longUrl;
        }

        let finalCode = customCode;
        if (!finalCode) {
            finalCode = generateRandomCode();
        } else {
            finalCode = finalCode.toLowerCase().replace(/[^a-z0-9]/g, '');
        }

        // validation
        if (finalCode.length < 4 || finalCode.length > 8) {
            showToast('Short code 4 se 8 character ka hona chahiye (a-z,0-9)', true);
            return;
        }

        if (shortLinks[finalCode]) {
            showToast(`"${finalCode}" already exists! Try different code.`, true);
            return;
        }

        // save
        shortLinks[finalCode] = longUrl;
        localStorage.setItem('my_short_links', JSON.stringify(shortLinks));

        // update UI
        renderLinksList();

        // build short url
        let base = window.location.origin + window.location.pathname.replace(/\/$/, '') + '/';
        let shortUrl = base + finalCode;
        
        showSuccess(shortUrl, longUrl, finalCode);
        
        // clear custom field
        customCodeInput.value = '';
        showToast('Short link ban gaya!', false);
    }

    // ---------- REDIRECT HANDLER (Most important for short links) ----------
    function handleRedirect() {
        // current path: /url-shortener/abc123  -> path = "abc123"
        let fullPath = window.location.pathname;
        let baseFolder = '/url-shortener/';
        let cleanPath = '';

        if (fullPath.startsWith(baseFolder)) {
            cleanPath = fullPath.substring(baseFolder.length);
        } else {
            // fallback: last part after last slash
            let parts = fullPath.split('/');
            cleanPath = parts[parts.length - 1];
        }

        // ignore index.html or empty
        if (cleanPath && cleanPath !== 'index.html' && cleanPath !== '') {
            let links = JSON.parse(localStorage.getItem('my_short_links')) || {};
            let destination = links[cleanPath];
            if (destination) {
                // redirect
                window.location.replace(destination);
                return;
            } else {
                // show error page manually
                document.body.innerHTML = `
                    <div style="max-width:500px; margin:100px auto; text-align:center; font-family:sans-serif; padding:20px;">
                        <h1>❌ Invalid short link</h1>
                        <p style="color:#334155;">"${cleanPath}" does not exist.</p>
                        <a href="/url-shortener/" style="display:inline-block; margin-top:20px; background:#4f46e5; color:white; padding:10px 20px; border-radius:30px; text-decoration:none;">🏠 Go to Homepage</a>
                    </div>
                `;
                return;
            }
        }
    }

    // ---------- Event listener ----------
    createBtn.addEventListener('click', createNewShortLink);
    
    // ---------- Load links & redirect ----------
    renderLinksList();
    handleRedirect();
</script>
</body>
</html>
