<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener - 5 Digit Short Links</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 30px auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            font-size: 1.8em;
            text-align: center;
        }
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 25px;
        }
        input, button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.02);
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 10px;
            display: none;
        }
        .result-box.show {
            display: block;
        }
        .short-url {
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            word-break: break-all;
            text-align: center;
        }
        .short-url a {
            color: #667eea;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
        }
        .copy-btn {
            background: #28a745;
            margin-top: 5px;
            padding: 10px;
        }
        .error {
            background: #ffebee;
            color: #c62828;
        }
        .link-list {
            margin-top: 25px;
            max-height: 300px;
            overflow-y: auto;
        }
        .link-item {
            background: #f5f5f5;
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .link-code {
            font-weight: bold;
            color: #667eea;
            font-family: monospace;
            font-size: 14px;
        }
        .delete-btn {
            background: #dc3545;
            padding: 5px 12px;
            font-size: 12px;
            width: auto;
            margin: 0;
        }
        .small-text {
            font-size: 12px;
            color: #666;
        }
        .flex-row {
            display: flex;
            gap: 10px;
        }
        .flex-row input {
            flex: 2;
        }
        .flex-row select {
            flex: 1;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }
        @media (max-width: 550px) {
            .container {
                padding: 20px;
            }
            .flex-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔗 5-6 Digit URL Shortener</h1>
    <div class="subtitle">Apna short link 5-6 digit mein banayein | Free | Permanent</div>
    
    <input type="url" id="longUrl" placeholder="Paste your long URL here" value="https://viral09.netlify.app">
    
    <div class="flex-row">
        <input type="text" id="customCode" placeholder="Custom code (5-6 digit) - ex: viral123">
        <select id="domainSelect"></select>
    </div>
    
    <button onclick="createShortLink()">✨ Generate Short Link</button>
    
    <div id="result" class="result-box"></div>
    
    <div class="link-list">
        <h3>📊 Your Saved Links</h3>
        <div id="linkList">Loading...</div>
    </div>
</div>

<script>
    // GitHub Configuration - Aapki details yahan daalein
    const GITHUB_USERNAME = 'YOUR_USERNAME'; // 🔴 YAHAN APNA GITHUB USERNAME DALEIN
    const REPO_NAME = 'url-shortener';
    
    let shortLinks = {};
    let GIST_ID = localStorage.getItem('gist_id');
    let GITHUB_TOKEN = localStorage.getItem('github_token');
    
    // Initialize
    async function init() {
        await loadData();
        displayLinks();
        setupDomain();
        
        // Agar token nahi hai to prompt karein
        if(!GITHUB_TOKEN) {
            setTimeout(() => askForToken(), 500);
        }
    }
    
    function askForToken() {
        let token = prompt(
            '🔐 GitHub Token Required for Permanent Save!\n\n' +
            'Steps to get token:\n' +
            '1. Go to github.com/settings/tokens\n' +
            '2. Click "Generate new token (classic)"\n' +
            '3. Give name: "URL Shortener"\n' +
            '4. Select scope: "gist"\n' +
            '5. Generate and COPY the token\n\n' +
            'Paste your token here:'
        );
        if(token && token.startsWith('ghp_')) {
            GITHUB_TOKEN = token;
            localStorage.setItem('github_token', token);
            alert('✅ Token saved! Your links will save permanently.');
            location.reload();
        }
    }
    
    async function loadData() {
        // Load from local backup first
        let localBackup = localStorage.getItem('shortLinks_backup');
        if(localBackup) {
            shortLinks = JSON.parse(localBackup);
        } else {
            shortLinks = {};
        }
        
        // Load from GitHub Gist if token exists
        if(GITHUB_TOKEN && GIST_ID) {
            try {
                let res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                let data = await res.json();
                if(data.files && data.files['shortlinks.json']) {
                    let remoteData = JSON.parse(data.files['shortlinks.json'].content);
                    shortLinks = { ...shortLinks, ...remoteData };
                    localStorage.setItem('shortLinks_backup', JSON.stringify(shortLinks));
                }
            } catch(e) { console.log('Gist load error:', e); }
        }
    }
    
    async function saveToGitHub() {
        if(!GITHUB_TOKEN) return;
        
        let content = JSON.stringify(shortLinks, null, 2);
        let gistData = {
            files: { 'shortlinks.json': { content: content } }
        };
        
        try {
            if(GIST_ID) {
                await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(gistData)
                });
            } else {
                let res = await fetch('https://api.github.com/gists', {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        description: 'URL Shortener Data',
                        public: false,
                        files: { 'shortlinks.json': { content: content } }
                    })
                });
                let data = await res.json();
                GIST_ID = data.id;
                localStorage.setItem('gist_id', GIST_ID);
            }
        } catch(e) { console.log('Save error:', e); }
    }
    
    function setupDomain() {
        let currentDomain = window.location.origin;
        let domainSelect = document.getElementById('domainSelect');
        domainSelect.innerHTML = `<option value="${currentDomain}">${currentDomain.replace('https://', '').replace('http://', '')}</option>`;
    }
    
    async function createShortLink() {
        let longUrl = document.getElementById('longUrl').value.trim();
        let customCode = document.getElementById('customCode').value.trim();
        let domain = document.getElementById('domainSelect').value;
        
        if(!longUrl) {
            showError('Please enter a URL!');
            return;
        }
        
        if(!longUrl.startsWith('http')) {
            longUrl = 'https://' + longUrl;
        }
        
        let shortCode = customCode;
        if(!shortCode) {
            shortCode = generateRandomCode();
        }
        
        // Validate length (5-6 digit)
        if(shortCode.length < 4 || shortCode.length > 8) {
            showError('Short code should be 4-8 characters only!');
            return;
        }
        
        // Check if code exists
        if(shortLinks[shortCode]) {
            showError('This code already exists! Try another one.');
            return;
        }
        
        // Save
        shortLinks[shortCode] = {
            url: longUrl,
            createdAt: new Date().toISOString(),
            clicks: 0
        };
        
        localStorage.setItem('shortLinks_backup', JSON.stringify(shortLinks));
        await saveToGitHub();
        
        displayLinks();
        
        let shortUrl = `${domain}/${shortCode}`;
        showResult(shortUrl, longUrl, shortCode);
        
        // Clear custom code field
        document.getElementById('customCode').value = '';
    }
    
    function generateRandomCode() {
        let length = Math.random() < 0.5 ? 5 : 6;
        let chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
        let code = '';
        for(let i = 0; i < length; i++) {
            code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return code;
    }
    
    function showResult(shortUrl, longUrl, shortCode) {
        let resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `
            <h3 style="color:#2e7d32; margin-bottom:10px;">✅ Short Link Created!</h3>
            <div class="short-url">
                <a href="${shortUrl}" target="_blank">${shortUrl}</a>
            </div>
            <button class="copy-btn" onclick="copyToClipboard('${shortUrl}')">📋 Copy to Clipboard</button>
            <div style="margin-top:10px; font-size:12px; color:#666;">
                🔗 Redirects to: ${longUrl.substring(0, 60)}${longUrl.length > 60 ? '...' : ''}<br>
                ⚡ Code: ${shortCode} | Permanent | No expiry
            </div>
        `;
        resultDiv.classList.add('show');
        setTimeout(() => {
            setTimeout(() => resultDiv.classList.remove('show'), 5000);
        }, 100);
    }
    
    function displayLinks() {
        let linkListDiv = document.getElementById('linkList');
        let links = Object.entries(shortLinks).reverse().slice(0, 15);
        
        if(links.length === 0) {
            linkListDiv.innerHTML = '<p style="color:#999; text-align:center;">No short links yet. Create your first one!</p>';
            return;
        }
        
        let currentDomain = window.location.origin;
        linkListDiv.innerHTML = links.map(([code, data]) => `
            <div class="link-item">
                <div>
                    <div class="link-code">🔗 /${code}</div>
                    <div class="small-text">${data.url.substring(0, 45)}${data.url.length > 45 ? '...' : ''}</div>
                    <div class="small-text">📅 ${new Date(data.createdAt).toLocaleDateString()}</div>
                </div>
                <div style="display: flex; gap: 5px;">
                    <button class="copy-btn" style="background:#007bff; width:auto; padding:5px 10px;" onclick="copyToClipboard('${currentDomain}/${code}')">Copy</button>
                    <button class="delete-btn" onclick="deleteLink('${code}')">Del</button>
                </div>
            </div>
        `).join('');
    }
    
    async function deleteLink(code) {
        if(confirm(`Delete "/${code}" ?`)) {
            delete shortLinks[code];
            localStorage.setItem('shortLinks_backup', JSON.stringify(shortLinks));
            await saveToGitHub();
            displayLinks();
            showError('Link deleted!', 'success');
        }
    }
    
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        alert('✅ Copied: ' + text);
    }
    
    function showError(msg, type = 'error') {
        let resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `<div style="background:${type === 'error' ? '#ffebee' : '#e8f5e9'}; color:${type === 'error' ? '#c62828' : '#2e7d32'}; padding:12px; border-radius:8px;">${msg}</div>`;
        resultDiv.classList.add('show');
        setTimeout(() => resultDiv.classList.remove('show'), 3000);
    }
    
    // Handle redirects from URL like /abc123
    async function handleRedirect() {
        let path = window.location.pathname.substring(1);
        
        if(path && path !== 'index.html' && path !== '') {
            await loadData();
            
            if(shortLinks[path]) {
                shortLinks[path].clicks++;
                localStorage.setItem('shortLinks_backup', JSON.stringify(shortLinks));
                await saveToGitHub();
                window.location.href = shortLinks[path].url;
            } else {
                document.body.innerHTML = `
                    <div style="text-align:center; margin-top:100px; font-family:Arial; padding:20px;">
                        <h1>❌ Invalid Short Link</h1>
                        <p>The short link "<strong>${path}</strong>" does not exist.</p>
                        <a href="/" style="color:#667eea;">← Go to Homepage</a>
                    </div>
                `;
            }
        }
    }
    
    // Start everything
    init();
    handleRedirect();
</script>
</body>
</html>
